<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的相簿</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f9f9f9; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 10px; box-shadow: 2px 2px 10px #eee; }
        img { width: 100%; height: auto; border-radius: 5px; }
        .time { font-size: 0.8em; color: #888; margin-top: 10px; }
        button { margin-top: 10px; background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>生活相簿</h1>
    <div id="gallery" class="gallery"><div class="spinner"></div></div>

    <script>
        async function loadImages() {
            try {
                const res = await fetch('/api/images');
                const data = await res.json();
                const container = document.getElementById('gallery');
                if (data.length === 0) { container.innerHTML = "<p>目前沒有照片</p>"; return; }
                container.innerHTML = data.map(item => `
                    <div class="card">
                        <img src="${item.url}" alt="LINE Photo">
                        <div class="time">${new Date(item.time).toLocaleString()}</div>
                        <button onclick="deleteImage('${item.public_id}')">刪除此照片</button>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function deleteImage(publicId) {
            if (!confirm("確定要刪除這張照片嗎？")) return;
            await fetch(`/api/images/${publicId}`, { method: 'DELETE' });
            loadImages(); // 重新整理列表
        }

        loadImages();
    </script>
</body>
</html>
