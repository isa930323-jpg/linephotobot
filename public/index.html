<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的相簿</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f9f9f9; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 10px; }
        img { width: 100%; height: auto; border-radius: 5px; }
        button { margin-top: 10px; background: #ff4d4d; color: white; border: none; padding: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>生活相簿</h1>
    <div id="gallery" class="gallery">讀取中...</div>

    <script>
        async function loadImages() {
            const res = await fetch('/api/images');
            const data = await res.json();
            const container = document.getElementById('gallery');
            container.innerHTML = data.map(item => `
                <div class="card">
                    <img src="${item.url}">
                    <button onclick="deleteImage('${item.public_id}')">刪除照片</button>
                </div>
            `).join('');
        }

        async function deleteImage(publicId) {
            if (!confirm("確定要刪除這張照片嗎？")) return;
            // 【修正重點】使用編碼後的 URL 傳遞 ID
            await fetch(`/api/images?id=${encodeURIComponent(publicId)}`, { method: 'DELETE' });
            loadImages();
        }
        loadImages();
    </script>
</body>
</html>
