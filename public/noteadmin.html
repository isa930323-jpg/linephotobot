<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 - LINE 相簿 & 留言板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .section h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        /* 管理工具列 */
        .admin-toolbar {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #764ba2;
        }
        
        .btn-danger {
            background: #ff4757;
            color: white;
        }
        
        .btn-danger:hover {
            background: #ff6b81;
        }
        
        .btn-warning {
            background: #ffa502;
            color: white;
        }
        
        .btn-warning:hover {
            background: #ffb142;
        }
        
        /* 留言板管理樣式 */
        .messages-container {
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
        }
        
        .message-item {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 0 8px 8px 0;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .message-content {
            flex: 1;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        
        .message-user {
            font-weight: bold;
            color: #667eea;
        }
        
        .message-time {
            color: #999;
        }
        
        .message-text {
            color: #333;
            line-height: 1.5;
            word-break: break-word;
        }
        
        .message-actions {
            display: flex;
            gap: 10px;
            margin-left: 20px;
        }
        
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .delete-btn:hover {
            background: #ff6b81;
        }
        
        /* 照片管理樣式 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .photo-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            aspect-ratio: 1;
        }
        
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .photo-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .photo-item:hover .photo-overlay {
            opacity: 1;
        }
        
        .photo-actions {
            display: flex;
            gap: 10px;
        }
        
        .photo-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            background: white;
            color: #333;
        }
        
        .photo-btn.delete {
            background: #ff4757;
            color: white;
        }
        
        .photo-btn.delete:hover {
            background: #ff6b81;
        }
        
        .photo-time {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px;
            font-size: 0.8em;
            text-align: center;
        }
        
        .load-more {
            text-align: center;
            margin-top: 20px;
        }
        
        .load-more button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .load-more button:hover {
            background: #764ba2;
        }
        
        .load-more button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* 確認對話框 */
        .confirm-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
        }
        
        .confirm-dialog.active {
            display: block;
        }
        
        .confirm-dialog h3 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .confirm-dialog .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        
        .overlay.active {
            display: block;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ 管理後台</h1>
        
        <!-- 留言管理區塊 -->
        <div class="section">
            <h2>💬 留言管理</h2>
            <div class="admin-toolbar">
                <button class="btn btn-danger" onclick="clearAllMessages()">清除所有留言</button>
                <button class="btn btn-primary" onclick="refreshMessages()">重新整理</button>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="loading">載入留言中...</div>
            </div>
        </div>
        
        <!-- 照片管理區塊 -->
        <div class="section">
            <h2>🖼️ 照片管理</h2>
            <div class="photo-grid" id="photoGrid"></div>
            <div class="load-more">
                <button id="loadMoreBtn" onclick="loadMoreImages()">載入更多照片</button>
            </div>
        </div>
    </div>
    
    <!-- 確認對話框 -->
    <div class="overlay" id="overlay"></div>
    <div class="confirm-dialog" id="confirmDialog">
        <h3 id="confirmMessage">確定要執行此操作嗎？</h3>
        <div class="btn-group">
            <button class="btn btn-danger" id="confirmBtn">確定</button>
            <button class="btn btn-primary" onclick="hideConfirm()">取消</button>
        </div>
    </div>

    <script>
        let currentCursor = null;
        let loading = false;
        let currentAction = null;
        
        // 載入留言
        async function loadMessages() {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '<div class="loading">載入留言中...</div>';
            
            try {
                const response = await fetch('/api/messages');
                const messages = await response.json();
                
                if (messages.length === 0) {
                    container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">目前還沒有留言</div>';
                    return;
                }
                
                container.innerHTML = messages.map(msg => `
                    <div class="message-item" data-id="${msg.id}">
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-user">${escapeHtml(msg.displayName || '匿名用戶')}</span>
                                <span class="message-time">${new Date(msg.timestamp).toLocaleString('zh-TW')}</span>
                            </div>
                            <div class="message-text">${escapeHtml(msg.text)}</div>
                        </div>
                        <div class="message-actions">
                            <button class="delete-btn" onclick="deleteMessage('${msg.id}')">刪除</button>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('載入留言失敗:', error);
                container.innerHTML = '<div style="text-align: center; color: #ff4757; padding: 20px;">載入留言失敗</div>';
            }
        }
        
        // 載入照片
        async function loadImages(cursor = null) {
            if (loading) return;
            loading = true;
            
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            loadMoreBtn.disabled = true;
            loadMoreBtn.textContent = '載入中...';
            
            try {
                const url = cursor ? `/api/images?cursor=${cursor}` : '/api/images';
                const response = await fetch(url);
                const data = await response.json();
                
                const grid = document.getElementById('photoGrid');
                
                if (!cursor) {
                    grid.innerHTML = '';
                }
                
                data.images.forEach(img => {
                    const div = document.createElement('div');
                    div.className = 'photo-item';
                    div.innerHTML = `
                        <img src="${img.url}" alt="照片" loading="lazy">
                        <div class="photo-time">${new Date(img.time).toLocaleString('zh-TW')}</div>
                        <div class="photo-overlay">
                            <div class="photo-actions">
                                <button class="photo-btn delete" onclick="deleteImage('${img.public_id}', this)">刪除</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(div);
                });
                
                currentCursor = data.nextCursor;
                
                if (!data.nextCursor) {
                    loadMoreBtn.style.display = 'none';
                } else {
                    loadMoreBtn.style.display = 'block';
                }
                
            } catch (error) {
                console.error('載入照片失敗:', error);
            } finally {
                loading = false;
                loadMoreBtn.disabled = false;
                loadMoreBtn.textContent = '載入更多照片';
            }
        }
        
        function loadMoreImages() {
            if (currentCursor) {
                loadImages(currentCursor);
            }
        }
        
        // 刪除單一訊息
        async function deleteMessage(messageId) {
            if (!confirm('確定要刪除這則留言嗎？')) return;
            
            try {
                const response = await fetch(`/api/messages/${messageId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    // 移除該留言元素
                    const messageElement = document.querySelector(`.message-item[data-id="${messageId}"]`);
                    if (messageElement) {
                        messageElement.remove();
                    }
                    
                    // 如果沒有留言了，顯示提示
                    if (document.querySelectorAll('.message-item').length === 0) {
                        document.getElementById('messagesContainer').innerHTML = 
                            '<div style="text-align: center; color: #999; padding: 20px;">目前還沒有留言</div>';
                    }
                } else {
                    alert('刪除失敗');
                }
            } catch (error) {
                console.error('刪除留言失敗:', error);
                alert('刪除失敗');
            }
        }
        
        // 清除所有留言
        async function clearAllMessages() {
            showConfirm('確定要清除所有留言嗎？此操作無法復原！', async () => {
                try {
                    const response = await fetch('/api/messages', {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        await loadMessages();
                    } else {
                        alert('清除失敗');
                    }
                } catch (error) {
                    console.error('清除留言失敗:', error);
                    alert('清除失敗');
                }
            });
        }
        
        // 刪除單一照片
        async function deleteImage(publicId, button) {
            if (!confirm('確定要刪除這張照片嗎？')) return;
            
            try {
                const response = await fetch(`/api/images?id=${publicId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    // 移除該照片元素
                    const photoItem = button.closest('.photo-item');
                    if (photoItem) {
                        photoItem.remove();
                    }
                } else {
                    alert('刪除失敗');
                }
            } catch (error) {
                console.error('刪除照片失敗:', error);
                alert('刪除失敗');
            }
        }
        
        // 重新整理留言
        function refreshMessages() {
            loadMessages();
        }
        
        // 確認對話框功能
        function showConfirm(message, onConfirm) {
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmDialog').classList.add('active');
            document.getElementById('overlay').classList.add('active');
            
            currentAction = onConfirm;
        }
        
        function hideConfirm() {
            document.getElementById('confirmDialog').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
            currentAction = null;
        }
        
        document.getElementById('confirmBtn').onclick = function() {
            if (currentAction) {
                currentAction();
            }
            hideConfirm();
        };
        
        // Escape HTML
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
        
        // 定期更新留言（每30秒）
        setInterval(loadMessages, 30000);
        
        // 初始載入
        loadMessages();
        loadImages();
    </script>
</body>
</html>
